<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>线上教室 — Leon Deutsch</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  background: #0f172a; color: #e2e8f0;
  min-height: 100dvh; line-height: 1.6;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}
.app-header {
  background: linear-gradient(135deg, #0f172a, #1e1b4b);
  text-align: center; padding: 24px 16px 20px;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.app-header h1 {
  font-size: clamp(1.3rem, 4vw, 1.8rem); font-weight: 800;
  background: linear-gradient(90deg, #f6d365, #fda085);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.app-header p { font-size: .82rem; color: #64748b; margin-top: 2px; }
.container { max-width: 720px; margin: 0 auto; padding: 16px; }
.card {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 16px; padding: 20px; margin-bottom: 16px;
}
.action-btn {
  display: block; width: 100%;
  background: linear-gradient(90deg, #f6d365, #fda085);
  color: #1a1a2e; border: none; border-radius: 12px;
  padding: 12px 24px; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: transform .15s, opacity .15s; min-height: 48px;
}
.action-btn:hover { opacity: .92; }
.action-btn:active { transform: scale(.97); }
.action-btn:disabled { opacity: .4; pointer-events: none; }
.danger-btn {
  display: block; width: 100%;
  background: rgba(239,68,68,.18); color: #f87171;
  border: 1px solid rgba(239,68,68,.25); border-radius: 12px;
  padding: 12px 20px; font-size: .95rem; font-weight: 600;
  cursor: pointer; transition: background .15s; min-height: 44px;
}
.danger-btn:hover { background: rgba(239,68,68,.28); }
.setup-input {
  width: 100%; background: rgba(0,0,0,.2); color: #e2e8f0;
  border: 1px solid rgba(255,255,255,.15); border-radius: 10px;
  padding: 12px 14px; font-size: 16px; outline: none; transition: border-color .2s;
}
.setup-input:focus { border-color: #f6d365; }
.setup-input::placeholder { color: #475569; }

.login-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.login-overlay.show { display: flex; }
.login-box {
  background: #1e293b; border: 1px solid rgba(255,255,255,.15);
  border-radius: 20px; padding: 28px 24px; width: 90%; max-width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5); position: relative;
}
.login-box h2 {
  font-size: 1.2rem; font-weight: 700; text-align: center; margin-bottom: 20px;
  background: linear-gradient(90deg, #f6d365, #fda085);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.login-box .setup-input { margin-bottom: 12px; }
.login-close {
  position: absolute; top: 10px; right: 14px;
  background: none; border: none; color: #64748b;
  font-size: 1.2rem; cursor: pointer; padding: 4px 8px;
}
.login-close:hover { color: #e2e8f0; }
.login-err { color: #fca5a5; font-size: .82rem; text-align: center; margin-top: 8px; min-height: 1.2em; }
.role-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
.role-toggle button {
  flex: 1; padding: 8px;
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.1);
  border-radius: 10px; color: #94a3b8; font-size: .85rem; font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.role-toggle button.sel {
  background: linear-gradient(90deg, #f6d365, #fda085);
  color: #1a1a2e; border-color: transparent;
}

.user-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; font-size: .85rem; }
.user-bar span { color: #94a3b8; }
.user-bar .user-name { color: #f6d365; font-weight: 600; }
.user-bar a { color: #64748b; cursor: pointer; text-decoration: underline; font-size: .8rem; }
.user-bar a:hover { color: #94a3b8; }
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 16px 0; color: #475569; font-size: .8rem;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.08);
}
.room-code-display {
  text-align: center; margin: 16px 0; padding: 12px;
  background: rgba(0,0,0,.3); border-radius: 12px;
  border: 1px dashed rgba(246,211,101,.3);
}
.room-code-display .label { font-size: .75rem; color: #64748b; margin-bottom: 4px; }
.room-code-display .code {
  font-size: 2rem; font-weight: 800; letter-spacing: 6px;
  background: linear-gradient(90deg, #f6d365, #fda085);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
}
.copy-hint { font-size: .72rem; color: #64748b; margin-top: 4px; cursor: pointer; }
.copy-hint:hover { color: #94a3b8; }
.lobby-status { text-align: center; font-size: .82rem; color: #64748b; margin-top: 12px; min-height: 1.2em; }

.call-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-size: .82rem; color: #94a3b8; }
.call-info .room-tag { background: rgba(246,211,101,.15); color: #f6d365; padding: 3px 10px; border-radius: 6px; font-weight: 600; font-size: .78rem; }
.video-grid {
  position: relative; width: 100%; aspect-ratio: 4/3;
  background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 16px;
}
#remote-video { width: 100%; height: 100%; object-fit: cover; background: #1a1a2e; }
#local-video {
  position: absolute; bottom: 12px; right: 12px; width: 120px;
  aspect-ratio: 4/3; object-fit: cover; border-radius: 8px;
  border: 2px solid rgba(246,211,101,.5); background: #0f172a; z-index: 2;
}
.video-placeholder {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%; color: #475569; font-size: .9rem;
  text-align: center; padding: 20px;
}
.call-status { text-align: center; font-size: .82rem; color: #94a3b8; min-height: 1.2em; }

#toast-container {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 300; display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast {
  background: #1e293b; border-left: 3px solid; border-radius: 8px;
  padding: 10px 16px; font-size: .82rem; color: #e2e8f0;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
  animation: toastIn .3s ease; pointer-events: auto; max-width: 340px;
}
.toast.info { border-color: #60a5fa; }
.toast.success { border-color: #86efac; }
.toast.error { border-color: #f87171; }
.toast.warning { border-color: #fbbf24; }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}
@media (max-width: 600px) {
  .container { padding: 10px; }
  .card { padding: 14px; margin-bottom: 12px; border-radius: 12px; }
  #local-video { width: 90px; bottom: 8px; right: 8px; }
  .room-code-display .code { font-size: 1.5rem; letter-spacing: 4px; }
}
@media (max-height: 500px) and (orientation: landscape) {
  .video-grid { aspect-ratio: 16/9; max-height: 70vh; }
}
</style>
</head>
<body>

<div class="app-header">
  <h1>线上教室</h1>
  <p>1:1 Video-Unterricht · Peer-to-Peer</p>
</div>

<div class="container" id="app-root">
  <!-- 大厅 -->
  <div id="view-lobby">
    <div class="user-bar">
      <span>Angemeldet als <span class="user-name" id="lobby-username">—</span></span>
      <a onclick="doLogout()">Abmelden</a>
    </div>
    <div class="card">
      <div id="teacher-panel">
        <button class="action-btn" id="btn-create-room" onclick="createRoom()">🏫 教室 erstellen</button>
        <div class="room-code-display" id="room-code-box" style="display:none">
          <div class="label">Raumcode (zum Teilen)</div>
          <div class="code" id="room-code-text">—</div>
          <div class="copy-hint" onclick="copyRoomCode()">📋 Kopieren</div>
        </div>
      </div>
      <div class="divider">— oder —</div>
      <div id="student-panel">
        <input class="setup-input" id="input-room-code" type="text" placeholder="6-stelligen Raumcode eingeben" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
        <button class="action-btn" id="btn-join-room" onclick="joinRoom()" style="margin-top:10px">🚪 Raum beitreten</button>
      </div>
      <div class="lobby-status" id="lobby-status"></div>
    </div>
  </div>

  <!-- 通话界面 -->
  <div id="view-call" class="card" style="display:none">
    <div class="call-info">
      <span>Raum: <span class="room-tag" id="call-room-tag">—</span></span>
      <span style="font-size:.78rem;color:#64748b" id="call-role-tag"></span>
    </div>
    <div class="video-grid" id="video-grid">
      <video id="remote-video" autoplay playsinline></video>
      <video id="local-video" autoplay muted playsinline></video>
      <div class="video-placeholder" id="remote-placeholder" style="position:absolute;inset:0">
        <span id="remote-status-text">Warte auf Verbindung...</span>
      </div>
    </div>
    <button class="danger-btn" id="btn-hangup" onclick="hangup()">📞 Auflegen</button>
    <div class="call-status" id="call-status"></div>
  </div>
</div>

<!-- 登录弹窗 -->
<div class="login-overlay show" id="login-overlay">
  <div class="login-box">
    <button class="login-close" onclick="closeLogin()" style="display:none">✕</button>
    <h2>Anmelden</h2>
    <input class="setup-input" id="login-user" type="text" placeholder="Benutzername" autocomplete="username">
    <input class="setup-input" id="login-pass" type="password" placeholder="Passwort" autocomplete="current-password">
    <div class="role-toggle" id="role-toggle">
      <button id="role-teacher" class="sel" onclick="selectRole('teacher')">👩‍🏫 Lehrer</button>
      <button id="role-student" onclick="selectRole('student')">👨‍🎓 Schüler</button>
    </div>
    <button class="action-btn" id="btn-login" onclick="doLogin()">Einloggen</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>
<div id="toast-container"></div>

<script>
// ============================================================
// 部署后替换为你的 FC 域名
const API_URL = (window.location.hostname === 'localhost')
  ? 'http://localhost:9000'
  : 'https://classroignaling-vlbccrwdrj.cn-hangzhou.fcapp.run';

const STUN_SERVERS = {
  iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
};

const USERS = {
  'guest':'a1trial','mia7':'wd8kp3','leo3':'rn5jq7',
  'kai9':'bx7ml2','zoe5':'fy4nh8','max2':'ck6st9',
  'ev1':'mzguya','tes5':'9rm4dr','tes6':'hrxfcc','cel4':'94vujv','vin2':'x3fz4g',
  'amy6':'qu3mj3','pia2':'32h7xh','pia6':'ghbqu6','gab7':'6g72cv','lia6':'u2c65k',
  'leni3':'gr7kpm','till4':'wd3nrf','anke2':'xf8qcb','sven7':'mh4tvg','gerd9':'rj9pwx',
  'finn1':'yb6kzd','hilde':'cv2nmq','maren':'lk5hjr','jule5':'tp8wgf','ralf8':'qz3dsb'
};

const POLL_INTERVAL = 500; // 每 0.5 秒轮询一次

// ============================================================
// DOM
// ============================================================
const $ = id => document.getElementById(id);

// ============================================================
// 状态
// ============================================================
let appState = 'lobby';
let pc = null;
let localStream = null;
let currentRoomCode = null;
let currentRole = null;
let currentUsername = null;
let currentPassword = null;
let loginRole = 'teacher';
let pollTimer = null;
let pingTimer = null;

// ============================================================
// Toast
// ============================================================
function showToast(message, type) {
  type = type || 'info';
  const container = $('toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = message;
  container.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transition = 'opacity .3s';
    setTimeout(() => el.remove(), 300);
  }, 4000);
}

// ============================================================
// API 调用
// ============================================================
async function api(action, extra) {
  extra = extra || {};
  const body = {
    username: currentUsername,
    password: currentPassword,
    role: currentRole,
    action: action,
    roomCode: currentRoomCode || '',
    ...extra
  };
  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await resp.json();
    return data;
  } catch (e) {
    return { error: 'Netzwerkfehler: ' + e.message };
  }
}

// ============================================================
// 轮询
// ============================================================
function startPolling() {
  stopPolling();
  pollTimer = setInterval(async () => {
    if (!currentRoomCode) return;
    const data = await api('poll');
    if (data.error) {
      showToast(data.error, 'error');
      return;
    }
    if (data.messages) {
      for (const msg of data.messages) {
        handleSignal(msg);
      }
    }
  }, POLL_INTERVAL);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

function startPing() {
  stopPing();
  pingTimer = setInterval(async () => {
    if (!currentRoomCode) return;
    await api('ping');
  }, 25000);
}

function stopPing() {
  if (pingTimer) { clearInterval(pingTimer); pingTimer = null; }
}

// ============================================================
// 消息处理
// ============================================================
function handleSignal(msg) {
  switch (msg.type) {
    case 'peer_joined':
      appState = 'connecting';
      enterCallView();
      $('remote-status-text').textContent = 'Schüler ist da! Baue Verbindung auf...';
      setTimeout(() => createOffer(), 500);
      break;

    case 'webrtc_offer':
      handleOffer(msg.payload.sdp);
      break;

    case 'webrtc_answer':
      handleAnswer(msg.payload.sdp);
      break;

    case 'webrtc_ice':
      handleICECandidate(msg.payload);
      break;

    case 'peer_left':
      showToast(
        msg.payload.reason === 'timeout' ? 'Raum wegen Inaktivität geschlossen' : 'Gesprächspartner hat den Raum verlassen',
        'warning'
      );
      hangupLocal();
      enterLobby();
      break;
  }
}

// ============================================================
// 登录
// ============================================================
function selectRole(role) {
  loginRole = role;
  $('role-teacher').className = role === 'teacher' ? 'sel' : '';
  $('role-student').className = role === 'student' ? 'sel' : '';
  $('login-err').textContent = '';
}

function doLogin() {
  const user = $('login-user').value.trim();
  const pass = $('login-pass').value.trim();
  if (!user) { $('login-err').textContent = 'Bitte Benutzername eingeben'; return; }
  if (USERS[user] !== pass) { $('login-err').textContent = '账号或密码错误'; return; }

  currentUsername = user;
  currentPassword = pass;
  currentRole = loginRole;
  localStorage.setItem('_classroom_user_v1', user);
  localStorage.setItem('_classroom_pass_v1', pass);
  localStorage.setItem('_classroom_role_v1', loginRole);

  $('login-overlay').classList.remove('show');
  $('login-err').textContent = '';
  enterLobby();
}

function closeLogin() {
  if (localStorage.getItem('_classroom_user_v1')) {
    $('login-overlay').classList.remove('show');
  }
}

function doLogout() {
  if (currentRoomCode) {
    api('leave_room');
  }
  stopPolling();
  stopPing();
  hangupLocal();
  localStorage.removeItem('_classroom_user_v1');
  localStorage.removeItem('_classroom_pass_v1');
  localStorage.removeItem('_classroom_role_v1');
  currentUsername = null;
  currentPassword = null;
  currentRole = null;
  currentRoomCode = null;
  appState = 'lobby';
  $('login-overlay').classList.add('show');
  $('login-user').value = '';
  $('login-pass').value = '';
  renderLobby();
}

// ============================================================
// 视图
// ============================================================
function enterLobby() {
  $('view-lobby').style.display = 'block';
  $('view-call').style.display = 'none';
  $('btn-create-room').disabled = false;
  $('btn-join-room').disabled = false;
  $('lobby-status').textContent = '';
  $('room-code-box').style.display = 'none';
  renderLobby();
}

function renderLobby() {
  $('lobby-username').textContent = currentUsername || '—';
  const isTeacher = currentRole === 'teacher';
  $('teacher-panel').style.display = isTeacher ? 'block' : 'none';
  $('student-panel').style.display = isTeacher ? 'none' : 'block';
}

function enterCallView() {
  $('view-lobby').style.display = 'none';
  $('view-call').style.display = 'block';
  $('call-room-tag').textContent = currentRoomCode || '—';
  $('call-role-tag').textContent = currentRole === 'teacher' ? 'Lehrer' : 'Schüler';
  $('btn-hangup').disabled = false;
  $('call-status').textContent = '';
  $('remote-placeholder').style.display = 'flex';
}

// ============================================================
// 房间操作
// ============================================================
async function createRoom() {
  $('btn-create-room').disabled = true;
  $('lobby-status').textContent = 'Erstelle Raum...';
  const data = await api('create_room');
  if (data.error) {
    showToast(data.error, 'error');
    $('btn-create-room').disabled = false;
    $('lobby-status').textContent = '';
    return;
  }
  currentRoomCode = data.roomCode;
  $('room-code-box').style.display = 'block';
  $('room-code-text').textContent = currentRoomCode;
  $('lobby-status').textContent = 'Warte auf Schüler...';
  appState = 'waiting';
  setupLocalMedia();
  startPolling();
  startPing();
}

async function joinRoom() {
  const code = $('input-room-code').value.trim();
  if (!/^\d{6}$/.test(code)) {
    showToast('Bitte 6-stelligen Raumcode eingeben', 'warning');
    return;
  }
  $('btn-join-room').disabled = true;
  $('lobby-status').textContent = 'Trete Raum bei...';
  const data = await api('join_room', { roomCode: code });
  if (data.error) {
    showToast(data.error, 'error');
    $('btn-join-room').disabled = false;
    $('lobby-status').textContent = '';
    return;
  }
  currentRoomCode = code;
  appState = 'connecting';
  enterCallView();
  $('remote-status-text').textContent = 'Verbunden, warte auf Video...';
  setupLocalMedia();
  startPolling();
  startPing();
}

function copyRoomCode() {
  if (!currentRoomCode) return;
  navigator.clipboard.writeText(currentRoomCode).then(() => {
    showToast('Raumcode kopiert!', 'success');
  }).catch(() => {
    showToast('Kopieren fehlgeschlagen', 'error');
  });
}

// ============================================================
// 媒体
// ============================================================
async function setupLocalMedia() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
      audio: { echoCancellation: true, noiseSuppression: true }
    });
    $('local-video').srcObject = localStream;
  } catch (e) {
    if (e.name === 'NotAllowedError') {
      showToast('Kamera/Mikrofon-Zugriff verweigert. Bitte in den Browser-Einstellungen erlauben.', 'error');
    } else if (e.name === 'NotFoundError') {
      showToast('Keine Kamera oder Mikrofon gefunden', 'error');
    } else {
      showToast('Medienzugriff fehlgeschlagen: ' + e.message, 'error');
    }
    if (appState === 'waiting') enterLobby();
  }
}

function stopLocalMedia() {
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  $('local-video').srcObject = null;
}

// ============================================================
// WebRTC
// ============================================================
function createPeerConnection() {
  if (pc) { pc.close(); pc = null; }
  pc = new RTCPeerConnection(STUN_SERVERS);

  pc.onicecandidate = (event) => {
    if (event.candidate) {
      api('send_signal', {
        signalType: 'webrtc_ice',
        signalPayload: {
          candidate: event.candidate.candidate,
          sdpMid: event.candidate.sdpMid,
          sdpMLineIndex: event.candidate.sdpMLineIndex
        }
      });
    }
  };

  pc.ontrack = (event) => {
    if (event.streams[0]) {
      $('remote-video').srcObject = event.streams[0];
      $('remote-placeholder').style.display = 'none';
    }
  };

  pc.oniceconnectionstatechange = () => {
    const state = pc.iceConnectionState;
    if (state === 'connected' || state === 'completed') {
      appState = 'in_call';
      $('call-status').textContent = 'Verbunden ✓';
      $('remote-placeholder').style.display = 'none';
    } else if (state === 'checking') {
      $('call-status').textContent = 'Verbindungsaufbau...';
    } else if (state === 'failed') {
      showToast('Peer-Verbindung fehlgeschlagen. Bitte erneut versuchen.', 'error');
      $('call-status').textContent = 'Fehlgeschlagen';
    } else if (state === 'disconnected') {
      $('call-status').textContent = 'Verbindung unterbrochen';
    }
  };

  if (localStream) {
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  }
}

async function createOffer() {
  createPeerConnection();
  try {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await api('send_signal', {
      signalType: 'webrtc_offer',
      signalPayload: { sdp: offer.sdp }
    });
    $('remote-status-text').textContent = 'Angebot gesendet, warte auf Antwort...';
  } catch (e) {
    showToast('Fehler beim Erstellen des Angebots: ' + e.message, 'error');
  }
}

async function handleOffer(sdp) {
  enterCallView();
  createPeerConnection();
  try {
    await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp }));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await api('send_signal', {
      signalType: 'webrtc_answer',
      signalPayload: { sdp: answer.sdp }
    });
    $('remote-status-text').textContent = 'Antwort gesendet, warte auf Verbindung...';
  } catch (e) {
    showToast('Fehler bei der Antwort: ' + e.message, 'error');
  }
}

async function handleAnswer(sdp) {
  try {
    await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp }));
    $('remote-status-text').textContent = 'Verbunden!';
  } catch (e) {
    showToast('Fehler beim Setzen der Antwort: ' + e.message, 'error');
  }
}

async function handleICECandidate(data) {
  if (!pc) return;
  try {
    await pc.addIceCandidate(new RTCIceCandidate({
      candidate: data.candidate,
      sdpMid: data.sdpMid,
      sdpMLineIndex: data.sdpMLineIndex
    }));
  } catch (e) { /* ignore */ }
}

async function hangup() {
  if (currentRoomCode) {
    await api('leave_room');
  }
  hangupLocal();
  enterLobby();
}

function hangupLocal() {
  stopPolling();
  stopPing();
  if (pc) { pc.close(); pc = null; }
  stopLocalMedia();
  $('remote-video').srcObject = null;
  $('remote-placeholder').style.display = 'flex';
  appState = 'lobby';
  currentRoomCode = null;
  $('room-code-box').style.display = 'none';
}

// ============================================================
// 初始化
// ============================================================
function init() {
  const savedUser = localStorage.getItem('_classroom_user_v1');
  const savedPass = localStorage.getItem('_classroom_pass_v1');
  const savedRole = localStorage.getItem('_classroom_role_v1');

  if (savedUser && savedPass && USERS[savedUser] === savedPass) {
    currentUsername = savedUser;
    currentPassword = savedPass;
    currentRole = savedRole || 'teacher';
    loginRole = currentRole;
    $('login-overlay').classList.remove('show');
    enterLobby();
  } else {
    $('login-overlay').classList.add('show');
    if (savedUser) $('login-user').value = savedUser;
  }
}

// 同时支持本地测试和 FC 部署
// 本地测试时启动 HTTP 服务器（和信令服务器在同一个端口）
if (typeof process !== 'undefined' && process.env && process.env.FC_SERVER_PORT) {
  // FC 环境 — 不需要额外启动
} else if (window.location.hostname === 'localhost' && window.location.port === '9000') {
  // 信令服务器自带 HTTP server，也提供静态文件
  // 不需要单独的前端服务器
}

window.addEventListener('DOMContentLoaded', init);
</script>
